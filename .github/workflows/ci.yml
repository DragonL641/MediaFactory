# GitHub Actions 工作流配置文件
# 定义项目的持续集成/持续部署(CI/CD)自动化流程

name: CI/CD Pipeline

on:
  # 当推送到 main 和 develop 分支时触发
  push:
    branches: [ main, develop ]
  # 当创建针对 main 分支的 Pull Request 时触发
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run tests with coverage
      run: uv run pytest tests/unit/ --override-ini="addopts=" --cov=src/mediafactory --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}

  # 代码质量检查作业
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --group dev

    # 检查版本号一致性（pyproject.toml / package.json / BUILD.md）
    - name: Check version consistency
      run: uv run python scripts/utils/sync_version.py --check

    # 使用Black检查代码格式是否符合规范 (仅警告，不中断)
    - name: Check code formatting with Black
      run: uv run black --check src/ || true

    # 使用Flake8检查严重的代码风格问题
    - name: Check code style with Flake8
      run: uv run flake8 src/ --select=E9,F63,F7,F82 --ignore=F821

  # 前端构建验证 + 类型检查
  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Typecheck
      run: npm run typecheck

    - name: Build
      run: npm run build

  # 安全扫描作业 - 检测代码和依赖中的安全漏洞
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --group dev

    # 运行Bandit安全扫描，递归扫描src目录，仅报告中高级风险
    - name: Run Bandit security scan
      continue-on-error: true
      run: uv run bandit -r src/ -ll -ii -f json -o bandit-results.json

    # 运行Safety依赖安全检查，生成完整报告
    - name: Run Safety dependency check
      continue-on-error: true
      run: uv run safety scan --full-report || uv run safety check --full-report

    # 将安全扫描结果作为工件存档保存
    - name: Archive security results
      uses: actions/upload-artifact@v4
      with:
        name: security-results
        path: bandit-results.json

  # 软件物料清单(SBOM)生成作业 - 创建项目依赖的软件清单
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --group dev

    # 生成XML格式的SBOM文件
    - name: Generate SBOM
      run: uv run cyclonedx-py environment --output-format xml -o bom.xml

    # 将生成的SBOM文件作为工件上传保存
    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: software-bill-of-materials
        path: bom.xml
