# GitHub Actions 工作流配置文件
# 定义项目的持续集成/持续部署(CI/CD)自动化流程

name: CI/CD Pipeline

on:
  # 当推送到 main 和 develop 分支时触发
  push:
    branches: [ main, develop ]
  # 当创建针对 main 分支的 Pull Request 时触发
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite
    # 运行环境 - 使用最新的Ubuntu系统
    runs-on: ubuntu-latest
    # 策略配置 - 矩阵策略允许在多个Python版本上并行测试
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    # 步骤1: 检出代码仓库
    - uses: actions/checkout@v4
    
    # 步骤2: 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    # 步骤3: 安装依赖
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync --group dev

    # 步骤4: 运行测试并生成覆盖率报告
    - name: Run tests with coverage
      run: |
        # 使用pytest运行测试，并生成XML格式的覆盖率报告
        uv run pytest tests/ --cov=mediafactory --cov-report=xml
    
    # 步骤5: 将覆盖率报告上传到Codecov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        # 指定要上传的覆盖率文件
        file: ./coverage.xml
        # 设置标记用于区分不同类型的测试
        flags: unittests
        # 上传任务的名称标识
        name: codecov-umbrella

  # 代码质量检查作业
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: |
        uv sync --group dev

    # 使用Black检查代码格式是否符合规范 (仅警告，不中断)
    - name: Check code formatting with Black
      run: uv run black --check src/ || true

    # 使用Flake8检查严重的代码风格问题
    - name: Check code style with Flake8
      run: uv run flake8 src/ --select=E9,F63,F7,F82


  # 安全扫描作业 - 检测代码和依赖中的安全漏洞
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    # 检出代码仓库
    - uses: actions/checkout@v4
    
    # 设置Python环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"
    
    # 安装 uv 和安全扫描工具
    - name: Install uv and security tools
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync --group dev
        uv pip install bandit safety
    
    # 运行Bandit安全扫描，递归扫描src目录，仅报告中高级风险
    - name: Run Bandit security scan
      continue-on-error: true
      run: uv run bandit -r src/ -ll -ii -f json -o bandit-results.json

    # 运行Safety依赖安全检查，生成完整报告
    - name: Run Safety dependency check
      continue-on-error: true
      run: uv run safety check --full-report
    
    # 将安全扫描结果作为工件存档保存
    - name: Archive security results
      uses: actions/upload-artifact@v4
      with:
        # 工件名称
        name: security-results
        # 要上传的文件路径
        path: bandit-results.json

  # 软件物料清单(SBOM)生成作业 - 创建项目依赖的软件清单
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    steps:
    # 检出代码仓库
    - uses: actions/checkout@v4
    
    # 设置Python环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    # 安装CycloneDX SBOM生成工具
    - name: Install cyclonedx-bom
      run: |
        uv sync
        uv pip install cyclonedx-bom

    # 生成XML格式的SBOM文件
    - name: Generate SBOM
      run: uv run cyclonedx-py environment --output-format xml -o bom.xml
    
    # 将生成的SBOM文件作为工件上传保存
    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        # 工件名称
        name: software-bill-of-materials
        # SBOM文件路径
        path: bom.xml