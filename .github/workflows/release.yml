name: Release Management

# 当给仓库打版本标签（git tag -a v1.0.0 -m ""）并推送到 GitHub时，自动运行。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  # Build Python backend + Electron frontend for each platform
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Python 后端 ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies (all, including ML)
        run: uv sync --group core

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build Python backend (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run python scripts/build/build_win.py

      - name: Build Python backend (macOS)
        if: matrix.os == 'macos-latest'
        run: uv run python scripts/build/build_darwin.py

      # ---- Electron 前端 ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run dist

      # ---- 源码归档（macOS 执行一次即可）----
      - name: Build source ZIP
        if: matrix.os == 'macos-latest'
        run: uv run python scripts/build/build_source.py --zip-only

      # ---- 上传产物 ----
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            release/**/*
          retention-days: 7

  # Create GitHub Release with all artifacts
  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v1
        id: git-cliff
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          config: cliff.toml
          args: --tag "$TAG_NAME"

      - name: Write release notes to file
        run: echo '${{ steps.git-cliff.outputs.content }}' > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
