appId: com.mediafactory.app
productName: MediaFactory
copyright: Copyright © 2024 MediaFactory

directories:
  output: release/${version}
  buildResources: src/electron/resources

files:
  - dist/electron/**/*
  - package.json

extraResources:
  # Python 后端 (PyInstaller 产物)
  - from: dist/python
    to: python
    filter:
      - "**/*"
  # 模型目录 (运行时创建)
  - from: models
    to: models
    filter:
      - "**/*"
  # 默认配置
  - from: config.toml
    to: config.toml

mac:
  category: public.app-category.video
  icon: src/electron/resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: src/electron/resources/entitlements.mac.plist
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  icon: src/electron/resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: src/electron/resources/icon.ico
  uninstallerIcon: src/electron/resources/icon.ico
  installerLanguages:
    - en_US
    - zh_CN
  language: "1033"  # 简体中文

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: src/electron/resources/icons
  category: AudioVideo
  artifactName: ${productName}-${version}-${arch}.${ext}
