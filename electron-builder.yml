appId: com.mediafactory.app
productName: MediaFactory
copyright: Copyright © 2024-2026 MediaFactory

directories:
  output: release/${version}
  buildResources: electron/resources

files:
  - dist/electron/**/*
  - package.json

extraResources:
  # Python 后端 (PyInstaller 产物)
  - from: dist/python
    to: python
    filter:
      - "**/*"
  # 模型目录 (无模型构建策略 - 用户通过 Setup Wizard 下载)
  - from: models
    to: models
    filter:
      - ".gitkeep"
  # 默认配置
  - from: config.toml
    to: config.toml

mac:
  category: public.app-category.video
  icon: electron/resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  icon: electron/resources/icon.ico
  target:
    - target: zip
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}-portable.${ext}
