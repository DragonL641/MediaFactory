repos:
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        language_version: python3
        files: ^src/

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--select=E9,F63,F7,F82", "--ignore=F821"]
        files: ^src/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        # 严重级别与 CI 一致：-ll (severity>=low) -ii (confidence>=medium)
        args: ["-ll", "-ii"]
        files: ^src/